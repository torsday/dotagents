name: Spike
description: Time-boxed research — output is a decision, not code
labels: ["spike"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question to answer
      description: One specific decision this spike will produce — not a general investigation.
    validations:
      required: true

  - type: input
    id: time-box
    attributes:
      label: Time box
      placeholder: "e.g. 2 days"
    validations:
      required: true

  - type: input
    id: output
    attributes:
      label: Output artifact
      description: What will be produced when this spike is done? ADR, design doc, written recommendation.
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options under consideration
      description: What alternatives are being evaluated?

  - type: textarea
    id: constraints
    attributes:
      label: Known constraints
      description: Constraints that will shape the decision.
